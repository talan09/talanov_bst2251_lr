<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    {% load static %}
    <title>Вход - Django Public Blog</title>
</head>
<body class="bg-green-600 space-y-8 px-20 py-8">
    <div class="flex justify-between items-center">
        <img src="{% static '/logo/logo.png' %}" class="h-64" alt="Logo" />
        <div class="flex items-center gap-6">
            <a href="{% url 'flatpages:archive' %}" class="underline cursor-pointer scroll-m-20 text-xl font-semibold tracking-tight text-white hover:text-green-200">
                Все статьи
            </a>
            <a href="{% url 'flatpages:register' %}" class="underline cursor-pointer scroll-m-20 text-xl font-semibold tracking-tight text-white hover:text-green-200">
                Регистрация
            </a>
        </div>
    </div>
    
    <div class="bg-green-700 rounded-lg p-8 shadow-lg max-w-2xl mx-auto">
        <h1 class="scroll-m-20 text-4xl font-extrabold tracking-tight lg:text-5xl text-white mb-8 text-center">
            Вход в систему
        </h1>
        
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <!-- Общая ошибка -->
            {% if error %}
            <div class="bg-red-500/20 border border-red-500 rounded-lg p-4 mb-4">
                <p class="text-red-200">{{ error }}</p>
            </div>
            {% endif %}
            
            <!-- Поле: Имя пользователя -->
            <div class="space-y-2">
                <label class="block scroll-m-20 text-lg font-semibold tracking-tight text-gray-200">
                    Имя пользователя <span class="text-red-300">*</span>
                </label>
                <input
                    type="text"
                    name="username"
                    placeholder="Введите имя пользователя"
                    value="{{ username|default:'' }}"
                    class="w-full px-4 py-3 rounded-lg bg-green-600 border border-green-500 text-white placeholder-green-300 focus:outline-none focus:border-green-400 focus:ring-2 focus:ring-green-400 transition duration-200"
                    required
                />
            </div>
            
            <!-- Поле: Пароль -->
            <div class="space-y-2">
                <label class="block scroll-m-20 text-lg font-semibold tracking-tight text-gray-200">
                    Пароль <span class="text-red-300">*</span>
                </label>
                <input
                    type="password"
                    name="password"
                    placeholder="Введите пароль"
                    class="w-full px-4 py-3 rounded-lg bg-green-600 border border-green-500 text-white placeholder-green-300 focus:outline-none focus:border-green-400 focus:ring-2 focus:ring-green-400 transition duration-200"
                    required
                />
            </div>
            
            <!-- Кнопка входа -->
            <div class="pt-4">
                <button type="submit" 
                        class="w-full bg-green-500 hover:bg-green-400 text-white font-semibold py-3 px-8 rounded-lg transition duration-200 shadow-md cursor-pointer">
                    Войти
                </button>
            </div>
            
            <!-- Ссылка на регистрацию -->
            <div class="text-center text-gray-200 text-sm">
                Нет аккаунта? 
                <a href="{% url 'flatpages:register' %}" class="underline hover:text-white">
                    Зарегистрируйтесь
                </a>
            </div>
        </form>
    </div>
</body>
</html>
