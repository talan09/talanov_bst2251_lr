<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    {% load static %}
    <title>Django Public Blog - создать статью</title>
</head>
<body class="bg-green-600 space-y-8 px-20 py-8">
    <div class="flex justify-between items-center">
        <img src="{% static '/logo/logo.png' %}" class="h-64" alt="Logo" />
        <a href="{% url 'flatpages:archive' %}" class="underline cursor-pointer scroll-m-20 text-xl font-semibold tracking-tight text-white hover:text-green-200">
            Все статьи
        </a>
    </div>
    
    <div class="bg-green-700 rounded-lg p-8 shadow-lg max-w-3xl mx-auto">
        <h1 class="scroll-m-20 text-4xl font-extrabold tracking-tight lg:text-5xl text-white mb-8">
            Наисать статью
        </h1>
        
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div class="space-y-2">
                <label class="block scroll-m-20 text-lg font-semibold tracking-tight text-gray-200">
                    Название статьи
                </label>
                <input
                    type="text"
                    name="title"
                    placeholder="Введите название статьи"
                    value="{{ form.title }}"
                    class="w-full px-4 py-3 rounded-lg bg-green-600 border border-green-500 text-white placeholder-green-300 focus:outline-none focus:border-green-400 focus:ring-2 focus:ring-green-400 transition duration-200"
                    required
                />
            </div>
            
            <div class="space-y-2">
                <label class="block scroll-m-20 text-lg font-semibold tracking-tight text-gray-200">
                    Текст статьи
                </label>
                <textarea
                    name="text"
                    placeholder="Напишите текст статьи..."
                    rows="12"
                    class="w-full px-4 py-3 rounded-lg bg-green-600 border border-green-500 text-white placeholder-green-300 focus:outline-none focus:border-green-400 focus:ring-2 focus:ring-green-400 transition duration-200 resize-y"
                    required
                >{{ form.text}}</textarea>

            </div>
            
            {% if form.errors %}
            <div class="bg-red-500/20 border border-red-500 rounded-lg p-4">
                <p class="text-red-200 font-semibold mb-2">Пожалуйста, исправьте следующие ошибки:</p>
                <ul class="list-disc list-inside text-red-200 text-sm">
                    {{form.errors}}
                </ul>
            </div>
            {% endif %}
            
            <div class="flex gap-4 pt-4">
                <button type="submit" 
                        class="bg-green-500 hover:bg-green-400 text-white font-semibold py-3 px-8 rounded-lg transition duration-200 shadow-md flex-1 cursor-pointer">
                    Опубликовать статью
                </button>
                <a href="{% url 'flatpages:archive' %}" 
                   class="bg-gray-500 hover:bg-gray-400 text-white font-semibold py-3 px-8 rounded-lg transition duration-200 shadow-md text-center">
                    Отмена
                </a>
            </div>
        </form>
    </div>
    
    {% if messages %}
    <div class="fixed bottom-4 right-4 space-y-2">
        {% for message in messages %}
        <div class="bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg animate-pulse">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
</body>
</html>
