<!DOCTYPE html>
<html>
<head>
    <title>Django Public Blog - создать статью</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #1abc9c;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1.5;
        }

        .content {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            padding: 40px;
            width: 90%;
            max-width: 600px;
            margin: 20px auto;
        }


        h1 {
            color: #2c3e50;
            font-size: 32px;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 500;
            border-bottom: 2px solid #1abc9c;
            padding-bottom: 15px;
        }


        input[type="text"],
        textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #1abc9c;
            background: white;
            box-shadow: 0 0 0 4px rgba(26, 188, 156, 0.2);
        }

        textarea {
            min-height: 200px;
            resize: vertical;
        }


        input[type="text"]::placeholder,
        textarea::placeholder {
            color: #999;
            font-style: italic;
            font-weight: 300;
        }


        input[type="submit"] {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: 500;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        input[type="submit"]:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.4);
        }

        input[type="submit"]:active {
            transform: translateY(0);
        }


        .form-errors,
        .errorlist {
            background: #fdeded;
            color: #d32f2f;
            padding: 15px 20px;
            border-radius: 12px;
            margin-top: 20px;
            border: 1px solid #f5c6c6;
            font-size: 14px;
            list-style: none;
        }

        .errorlist li {
            margin: 5px 0;
        }


        @media (max-width: 768px) {
            .content {
                padding: 25px;
                margin: 15px;
            }

            h1 {
                font-size: 28px;
            }

            input[type="text"],
            textarea {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
<div class="content">
    <h1>Написать статью</h1>
    <form method="POST">{% csrf_token %}
        <input type="text" name="title" placeholder="Название статьи" value="{{ form.title.value|default:'' }}">
        <textarea name="text" placeholder="Текст статьи">{{ form.text.value|default:'' }}</textarea>
        <input type="submit" value="Сохранить">
    </form>
    {{ form.errors }}
</div>
</body>
</html>
